name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: TypeScript compile check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: CSV validation (dry-run)
        run: |
          # Only run if url/Dataset.csv exists in test fixtures
          if [ -f "tests/fixtures/sample.csv" ]; then
            CSV_FILE=sample.csv URL_DIR=tests/fixtures npm run validate-csv
          fi
